name: Release plan package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      - run: ruff check src tests scripts
      - run: mypy src tests scripts
      - run: pytest -q
      - run: python -m build
      - run: |
          python -m venv /tmp/plan-release-smoke
          /tmp/plan-release-smoke/bin/python -m pip install --upgrade pip
          /tmp/plan-release-smoke/bin/python -m pip install dist/*.whl
          /tmp/plan-release-smoke/bin/opencode-plan --help
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
